version: '3.8'

services:
  # 1. MySQL 세팅 (매장 정보 및 유저 구독 정보 저장용)
  mysql:
    image: mysql:8.0
    container_name: pinpoint-mysql
    ports:
      - "3307:3306" # 내 컴퓨터 3307 -> 도커 3306 연결
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pin_point_db 
      TZ: Asia/Seoul
    volumes:
      - mysql-data:/var/lib/mysql

  # 2. Redis 세팅 (실시간 위치 검색, 신규 매장 중복 체크 캐시용)
  redis:
    image: redis:latest
    container_name: pinpoint-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data: